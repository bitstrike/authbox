{{define "settings_oidc"}}
<h2 class="text-lg font-semibold mb-4">OIDC Provider</h2>
<form method="POST" action="/settings/oidc">
  <div class="space-y-3">
    <div>
      <label class="label" for="issuer">Issuer URL</label>
      <input type="url" id="issuer" name="issuer_url" class="input" value="{{.OIDCIssuer}}" data-original="{{.OIDCIssuer}}" oninput="checkOIDCChanged()">
    </div>
    <div>
      <label class="label" for="client-id">Client ID</label>
      <input type="text" id="client-id" name="client_id" class="input" value="{{.OIDCClientID}}" data-original="{{.OIDCClientID}}" oninput="checkOIDCChanged()">
    </div>
    <div>
      <label class="label">Client Secret</label>
      <p class="text-sm text-gray-500 dark:text-gray-400">
        {{if .OIDCSecretConfigured}}Configured (read from secrets volume){{else}}Not configured{{end}}
      </p>
    </div>
  </div>
  <button type="submit" id="oidc-save" class="btn btn-primary mt-4" disabled>Save</button>
</form>
<script>
function checkOIDCChanged() {
  var issuer = document.getElementById('issuer');
  var clientId = document.getElementById('client-id');
  var changed = issuer.value !== issuer.dataset.original || clientId.value !== clientId.dataset.original;
  document.getElementById('oidc-save').disabled = !changed;
}
</script>
{{end}}
