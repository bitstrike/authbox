{{define "settings_session"}}
<h2 class="text-lg font-semibold mb-4">Session</h2>
<form method="POST" action="/settings/session">
  <div>
    <label class="label" for="timeout">Session Timeout (minutes)</label>
    <input type="number" id="timeout" name="timeout_minutes" class="input w-32" value="{{.SessionTimeout}}" min="5" max="480">
  </div>
  <button type="submit" class="btn btn-primary mt-4">Save</button>
</form>
{{end}}
