{{define "settings_ssh_ca"}}
<h2 class="text-lg font-semibold mb-4">SSH CA</h2>
<div class="space-y-3">
  <div>
    <label class="label">CA Public Key</label>
    <textarea class="input font-mono text-xs" rows="3" readonly>{{.CAPublicKey}}</textarea>
  </div>
  <form method="POST" action="/settings/ssh-ttl">
    <label class="label" for="cert-ttl">Default Certificate TTL</label>
    <div class="flex space-x-2">
      <input type="text" id="cert-ttl" name="cert_ttl" class="input w-32" value="{{.SSHCertTTL}}" data-original="{{.SSHCertTTL}}" oninput="document.getElementById('ssh-ttl-save').disabled=(this.value===this.dataset.original)">
      <button type="submit" id="ssh-ttl-save" class="btn btn-primary" disabled>Save</button>
    </div>
  </form>
</div>
{{end}}
