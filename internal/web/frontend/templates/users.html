{{define "content"}}
<div class="flex justify-between items-center mb-6">
  <h1 class="text-2xl font-semibold">Users</h1>
  <div class="flex space-x-2">
    {{if or .IsAdmin .IsOperator}}
    <a href="/users/import" class="btn btn-secondary">Bulk Import</a>
    <a href="/users/new" class="btn btn-primary">Create User</a>
    {{end}}
  </div>
</div>

<div class="card">
  <div id="user-list" class="table-container" hx-get="/partials/users/list" hx-trigger="load" hx-swap="innerHTML">
    <p class="text-gray-500 dark:text-gray-400 text-sm">Loading...</p>
  </div>
</div>
{{end}}
