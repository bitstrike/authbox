{{define "content"}}
<h1 class="text-2xl font-semibold mb-6">Service Accounts</h1>

<div class="card">
  <div class="flex justify-between items-center mb-4">
    <h2 class="text-lg font-semibold">Accounts</h2>
    <button class="btn btn-primary" onclick="document.getElementById('sa-create-form').classList.toggle('hidden')">Create</button>
  </div>

  <!-- Create form (hidden by default) -->
  <div id="sa-create-form" class="hidden mb-6 p-4 border rounded dark:border-gray-700">
    <form method="POST" action="/service-accounts">
      <div class="space-y-3">
        <div>
          <label class="label" for="sa-desc">Description</label>
          <input type="text" id="sa-desc" name="description" class="input" required>
        </div>
        <div>
          <label class="label" for="sa-role">Role</label>
          <select id="sa-role" name="role" class="input" required>
            <option value="viewer">Viewer</option>
            <option value="operator">Operator</option>
            <option value="admin">Admin</option>
          </select>
        </div>
      </div>
      <button type="submit" class="btn btn-primary mt-3">Create Account</button>
    </form>
  </div>

  <!-- Secret display (shown after creation) -->
  {{if .Content.NewSecret}}
  <div class="mb-6 p-4 border-2 border-yellow-400 rounded bg-yellow-50 dark:bg-yellow-900/20">
    <p class="font-semibold text-yellow-800 dark:text-yellow-200 mb-2">Save this secret now. It cannot be retrieved again.</p>
    <div class="space-y-2 text-sm font-mono">
      <div><span class="text-gray-500">client_id:</span> {{.Content.NewClientID}}</div>
      <div><span class="text-gray-500">client_secret:</span> {{.Content.NewSecret}}</div>
    </div>
  </div>
  {{end}}

  <div id="sa-list" hx-get="/partials/service-accounts/list" hx-trigger="load" hx-swap="innerHTML">
    <p class="text-gray-500 dark:text-gray-400 text-sm">Loading...</p>
  </div>
</div>
{{end}}
