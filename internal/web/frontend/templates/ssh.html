{{define "content"}}
<h1 class="text-2xl font-semibold mb-6">SSH Certificates</h1>

<div class="grid grid-cols-1 lg:grid-cols-2 gap-6">
  <!-- Issue cert -->
  <div class="card">
    <h2 class="text-lg font-semibold mb-4">Issue Certificate</h2>
    <form hx-post="/ssh/sign" hx-target="#ssh-result" hx-swap="innerHTML">
      <div class="mb-4">
        <label class="label" for="pubkey">Public Key</label>
        <textarea id="pubkey" name="pubkey" rows="4" class="input font-mono text-xs"
          placeholder="Paste your ssh-ed25519, ssh-rsa, or ecdsa-sha2 public key" required></textarea>
      </div>
      <p class="text-sm text-gray-500 dark:text-gray-400 mb-4">Certificate will be valid for the configured TTL.</p>
      <button type="submit" class="btn btn-primary">Sign Key</button>
    </form>
    <div id="ssh-result" class="mt-4"></div>
  </div>

  <!-- Cert list -->
  {{if or .IsAdmin .IsViewer}}
  <div class="card">
    <h2 class="text-lg font-semibold mb-4">Issued Certificates</h2>
    <div id="cert-list" hx-get="/partials/ssh/certs" hx-trigger="load, cert-issued from:body" hx-swap="innerHTML">
      <p class="text-gray-500 dark:text-gray-400 text-sm">Loading...</p>
    </div>
  </div>
  {{end}}
</div>
{{end}}
