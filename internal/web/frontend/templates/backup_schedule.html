{{define "backup_schedule"}}
<h2 class="text-lg font-semibold mb-4">Scheduled Backup</h2>
<form hx-post="/backup/schedule" hx-target="#backup-panel" hx-swap="innerHTML">
  <div class="space-y-3">
    <label class="flex items-center space-x-2">
      <input type="checkbox" id="sched-enabled" name="enabled" {{if .BackupEnabled}}checked{{end}} onchange="toggleScheduleFields()">
      <span class="text-sm">Enable daily slapcat backup</span>
    </label>
    <div>
      <label class="label" for="backup-time">Backup Time</label>
      <input type="time" id="backup-time" name="time" class="input w-32" value="{{.BackupTime}}"{{if not .BackupEnabled}} disabled{{end}}>
    </div>
    <div>
      <label class="label" for="backup-retention">Retention (days)</label>
      <input type="number" id="backup-retention" name="retention" class="input w-32" value="{{.BackupRetention}}" min="1"{{if not .BackupEnabled}} disabled{{end}}>
    </div>
  </div>
  <button type="submit" id="sched-btn" class="btn btn-primary mt-4">{{if .BackupEnabled}}Enable Schedule{{else}}Disable Schedule{{end}}</button>
</form>
<script>
function toggleScheduleFields() {
  var cb = document.getElementById('sched-enabled');
  var btn = document.getElementById('sched-btn');
  var timeInput = document.getElementById('backup-time');
  var retInput = document.getElementById('backup-retention');
  var enabled = cb.checked;
  timeInput.disabled = !enabled;
  retInput.disabled = !enabled;
  btn.textContent = enabled ? 'Enable Schedule' : 'Disable Schedule';
}
</script>
{{end}}
