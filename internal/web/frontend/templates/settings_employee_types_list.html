{{define "settings_employee_types_list"}}
{{if .Types}}
<table class="table">
  <thead>
    <tr>
      <th>Emoji</th>
      <th>Value</th>
      <th>Label</th>
      <th>Order</th>
      <th></th>
    </tr>
  </thead>
  <tbody>
    {{range .Types}}
    <tr>
      <td class="text-lg">{{.Emoji}}</td>
      <td class="font-mono text-sm">{{.Value}}</td>
      <td>{{.Label}}</td>
      <td class="text-sm text-gray-500">{{.SortOrder}}</td>
      <td>
        <button class="text-red-500 text-xs" hx-delete="/settings/employee-types/{{.Value}}" hx-target="#employee-types-list" hx-swap="innerHTML" hx-confirm="Remove type '{{.Label}}'?">Remove</button>
      </td>
    </tr>
    {{end}}
  </tbody>
</table>
{{else}}
<p class="text-sm text-gray-500 dark:text-gray-400">No employee types defined.</p>
{{end}}
{{end}}
