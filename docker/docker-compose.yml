services:
  primary:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    ports:
      - "389:389"
      - "636:636"
      - "8443:8443"
    volumes:
      - ldap-data-primary:/var/lib/openldap
      - ldap-config-primary:/etc/openldap/slapd.d
      - app-data-primary:/data
      - ./logs/primary:/app/logs
      - ../ldif:/app/ldif:ro
      - /etc/secrets/authbox:/etc/secrets/authbox:ro
    environment:
      - ROLE=${ROLE:-primary}
      - RUNTIME_SECRETS=${RUNTIME_SECRETS:-/etc/secrets/authbox}
      - LDAP_BASE_DN=${LDAP_BASE_DN:-dc=example,dc=com}
      - OIDC_ISSUER_URL=${OIDC_ISSUER_URL:-https://accounts.google.com}
      - INITIAL_ADMIN_EMAIL=${INITIAL_ADMIN_EMAIL:-admin@example.com}
      - TLS_CERT_PATH=${TLS_CERT_PATH:-/data/tls/cert.pem}
      - TLS_KEY_PATH=${TLS_KEY_PATH:-/data/tls/key.pem}
      - TLS_DOMAIN=${TLS_DOMAIN:-}
      - TLS_ACME_EMAIL=${TLS_ACME_EMAIL:-}
      - AWS_HOSTED_ZONE_ID=${AWS_HOSTED_ZONE_ID:-}
      - SSH_CERT_TTL=${SSH_CERT_TTL:-12h}
      - UID_RANGE_START=${UID_RANGE_START:-10000}
      - UID_RANGE_END=${UID_RANGE_END:-60000}
      - LOG_LEVEL=${LOG_LEVEL:-info}
    restart: unless-stopped

  replica:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    ports:
      - "390:389"
      - "637:636"
      - "8444:8443"
    volumes:
      - ldap-data-replica:/var/lib/openldap
      - ldap-config-replica:/etc/openldap/slapd.d
      - app-data-replica:/data
      - ./logs/replica:/app/logs
      - ../ldif:/app/ldif:ro
      - /etc/secrets/authbox:/etc/secrets/authbox:ro
    environment:
      - ROLE=replica
      - PRIMARY_HOST=${PRIMARY_HOST:-primary}
      - RUNTIME_SECRETS=${RUNTIME_SECRETS:-/etc/secrets/authbox}
      - LDAP_BASE_DN=${LDAP_BASE_DN:-dc=example,dc=com}
      - OIDC_ISSUER_URL=${OIDC_ISSUER_URL:-https://accounts.google.com}
      - TLS_CERT_PATH=${TLS_CERT_PATH:-/data/tls/cert.pem}
      - TLS_KEY_PATH=${TLS_KEY_PATH:-/data/tls/key.pem}
      - TLS_DOMAIN=${TLS_DOMAIN:-}
      - TLS_ACME_EMAIL=${TLS_ACME_EMAIL:-}
      - AWS_HOSTED_ZONE_ID=${AWS_HOSTED_ZONE_ID:-}
      - LOG_LEVEL=${LOG_LEVEL:-info}
    restart: unless-stopped
    depends_on:
      - primary

volumes:
  ldap-data-primary:
  ldap-config-primary:
  app-data-primary:
  ldap-data-replica:
  ldap-config-replica:
  app-data-replica:

# Secrets directory layout (/etc/secrets/authbox/):
#
#   google              - Google OIDC (key=value format, per Google JSON credential)
#                         client_id=<your-google-client-id>
#                         client_secret=<your-google-client-secret>
#
#   entra               - Microsoft Entra ID (key=value format, per Azure SDK convention)
#                         AZURE_CLIENT_ID=<your-entra-client-id>
#                         AZURE_CLIENT_SECRET=<your-entra-client-secret>
#                         AZURE_TENANT_ID=<your-tenant-id>
#
#   aws                 - AWS credentials (key=value format, per ~/.aws/credentials)
#                         aws_access_key_id=<your-aws-access-key-id>
#                         aws_secret_access_key=<your-aws-secret-access-key>
#
#   ldap_admin_password - Single value: the OpenLDAP admin bind password
#
#   replica_sync_password - Single value: shared secret for container-to-container auth
