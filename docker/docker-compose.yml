services:
  primary:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    ports:
      - "389:389"
      - "636:636"
      - "8443:8443"
    volumes:
      - ldap-data-primary:/var/lib/openldap
      - ldap-config-primary:/etc/openldap/slapd.d
      - app-data-primary:/data
      - ./logs/primary:/app/logs
      - ../ldif:/app/ldif:ro
      - /etc/secrets/authbox:/etc/secrets/authbox:ro
    environment:
      - ROLE=primary
      - RUNTIME_SECRETS=/etc/secrets/authbox
      - LDAP_BASE_DN=dc=example,dc=com
      - OIDC_ISSUER_URL=https://accounts.google.com
      - INITIAL_ADMIN_EMAIL=admin@example.com
      - TLS_CERT_PATH=/data/tls/cert.pem
      - TLS_KEY_PATH=/data/tls/key.pem
      - SSH_CERT_TTL=12h
      - UID_RANGE_START=10000
      - UID_RANGE_END=60000
      - LOG_LEVEL=info
    restart: unless-stopped

  replica:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    ports:
      - "390:389"
      - "637:636"
      - "8444:8443"
    volumes:
      - ldap-data-replica:/var/lib/openldap
      - ldap-config-replica:/etc/openldap/slapd.d
      - app-data-replica:/data
      - ./logs/replica:/app/logs
      - ../ldif:/app/ldif:ro
      - /etc/secrets/authbox:/etc/secrets/authbox:ro
    environment:
      - ROLE=replica
      - PRIMARY_HOST=primary
      - RUNTIME_SECRETS=/etc/secrets/authbox
      - LDAP_BASE_DN=dc=example,dc=com
      - OIDC_ISSUER_URL=https://accounts.google.com
      - TLS_CERT_PATH=/data/tls/cert.pem
      - TLS_KEY_PATH=/data/tls/key.pem
      - LOG_LEVEL=info
    restart: unless-stopped
    depends_on:
      - primary

volumes:
  ldap-data-primary:
  ldap-config-primary:
  app-data-primary:
  ldap-data-replica:
  ldap-config-replica:
  app-data-replica:

# Secrets directory layout (/etc/secrets/authbox/):
#
#   google              - Google OIDC (key=value format)
#                         client_id=<your-google-client-id>
#                         client_secret=<your-google-client-secret>
#
#   entra               - Microsoft Entra ID (key=value format, use instead of google)
#                         client_id=<your-entra-client-id>
#                         client_secret=<your-entra-client-secret>
#
#   aws                 - AWS credentials for Route53 DNS-01 (key=value format)
#                         access_key_id=<your-aws-access-key-id>
#                         secret_access_key=<your-aws-secret-access-key>
#
#   ldap_admin_password - Single value: the OpenLDAP admin bind password
#
#   internal_secret     - Single value: shared secret for container-to-container auth
